version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: quiz_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: quiz_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/quizapp
      # Add other necessary env variables like JWT_SECRET here
      - JWT_SECRET=my_super_secret_jwt_key
    depends_on:
      - mongodb
    restart: always

  frontend:
    build: ./frontend
    container_name: quiz_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongodb_data:
