<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Quiz App</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #667eea, #764ba2);
  color: white;
  text-align: center;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
  color: #333;
}

select, button {
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #667eea;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}

.question {
  background: #f9f9f9;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  text-align: left;
}

#timer {
  color: red;
  font-weight: bold;
}

#result {
  font-size: 20px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h1>Smart Quiz App</h1>

<select id="category">
  <option value="">All Categories</option>
  <option value="GK">GK</option>
  <option value="Math">Math</option>
  <option value="CS">CS</option>
</select>

<h3 id="timer">Time: 30</h3>

<div id="quiz"></div>

<button id="submit">Submit</button>

<h2 id="result"></h2>

</div>

<script>
let time = 30;

function startTimer(){
  const timer = setInterval(()=>{
    time--;
    document.getElementById('timer').textContent = "Time: " + time;

    if(time === 0){
      clearInterval(timer);
      submitAnswers();
    }
  },1000);
}

async function loadQuiz() {
  const category = document.getElementById('category').value;

  const res = await fetch('/quiz?category=' + category);
  const quiz = await res.json();

  const container = document.getElementById('quiz');
  container.innerHTML = "";

  quiz.forEach(q => {
    const div = document.createElement('div');
    div.className = "question";

    div.innerHTML = `<p><b>${q.id}. ${q.question}</b></p>`;

    q.options.forEach(opt => {
      const label = document.createElement('label');

      label.innerHTML = `
        <input type="radio" name="q${q.id}" value="${opt}">
        ${opt}
      `;

      div.appendChild(label);
      div.appendChild(document.createElement('br'));
    });

    container.appendChild(div);
  });
}

async function submitAnswers() {
  const answers = [];

  document.querySelectorAll('.question').forEach(div => {
    const checked = div.querySelector('input:checked');
    if (checked) {
      const id = Number(checked.name.replace('q', ''));
      answers.push({ id, answer: checked.value });
    }
  });

  const res = await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ answers })
  });

  const data = await res.json();

  document.getElementById('result').textContent =
    `🎉 Your Score: ${data.score} / ${data.total}`;
}

document.getElementById('submit').addEventListener('click', submitAnswers);
document.getElementById('category').addEventListener('change', loadQuiz);

loadQuiz();
startTimer();
</script>

</body>
</html>
